<section class="skills-section">
  <div class="skills-inner">

    <span class="section-label">Tecnologías</span>
    <h2 class="section-title">Mis <em>Skills</em></h2>
    <p class="section-subtitle">Herramientas y tecnologías en las que soy bueno:</p>

    <div class="skills-grid">
      @for(item of images; track $index) {
        <div class="skill-card">
          <img [src]="item.src" alt="{{ item.alt }}" class="skill-icon">
          <span class="skill-name">{{ item.label }}</span>
        </div>
      }
    </div>

  </div>
</section>
