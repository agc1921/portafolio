<section class="aprendizaje-section">
  <div class="aprendizaje-inner">

    <span class="section-label">Formación continua</span>
    <h2 class="section-title"><em>Aprendizaje</em></h2>
    <p class="section-subtitle">Certificaciones y cursos que respaldan mi crecimiento profesional.</p>

    <div class="cursos-grid">
      @for(item of cursos; track $index) {
        <a [href]="item.url" target="_blank" rel="noopener" class="curso-card">
          <div class="curso-img-wrap">
            <img [src]="item.src" [alt]="item.alt" class="curso-img">
            <div class="curso-overlay">
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Ver certificado
              </span>
            </div>
          </div>
          <div class="curso-footer">
            <span class="curso-badge">Certificado</span>
            <span class="curso-link-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </span>
          </div>
        </a>
      }
    </div>

  </div>
</section>
